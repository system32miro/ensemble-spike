name: ContextPack Gen (PR)

on:
  pull_request:
    types: [opened, synchronize, reopened]

permissions:
  contents: read
  pull-requests: write

jobs:
  contextpack:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install deps
        run: |
          python -m pip install --upgrade pip
          pip install jsonschema

      - name: Compute changed files
        id: diff
        shell: bash
        run: |
          BASE_SHA="${{ github.event.pull_request.base.sha }}"
          HEAD_SHA="${{ github.sha }}"
          files=$(git diff --name-only "$BASE_SHA" "$HEAD_SHA" | tr '\n' ' ')
          echo "files=$files" >> "$GITHUB_OUTPUT"

      - name: Compute objective
        id: obj
        shell: bash
        run: |
          title="${{ github.event.pull_request.title }}"
          if [ -z "$title" ]; then
            title="${{ github.sha }}"
          fi
          echo "objective=$title" >> "$GITHUB_OUTPUT"

      - name: Generate ContextPack
        shell: bash
        run: |
          mkdir -p .context
          files="${{ steps.diff.outputs.files }}"
          if [ -z "$files" ]; then
            files="src/calc.py tests/test_calc.py"
          fi
          echo "Using files: $files"
          # expand files safely into an array for --files
          read -ra arr <<< "$files"
          python scripts/context_pack.py \
            --task-id "pr-${{ github.event.number }}" \
            --objective "${{ steps.obj.outputs.objective }}" \
            --files "${arr[@]}" \
            --out .context/context.json

      - name: Upload ContextPack artifact
        uses: actions/upload-artifact@v4
        with:
          name: contextpack-pr-${{ github.event.number }}
          path: .context/context.json

      - name: Comment Context Digest
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require('fs');
            const path = '.context/context.json';
            const data = JSON.parse(fs.readFileSync(path, 'utf8'));
            const summary = `ContextPack gerado para PR #${context.issue.number}\n\n` +
              `- task_id: ${data.task_id}\n- repo.sha: ${data.repo.sha}\n- objective: ${data.objective}\n- editable_paths: ${(data.policies.editable_paths||[]).join(', ')}`;
            await github.rest.issues.createComment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.issue.number,
              body: summary
            });
